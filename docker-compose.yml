# SearXNG + Crawl4AI MCP - Truly Self-Hosted Search & Scrape Stack

services:
  # SearXNG - Open source metasearch engine
  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    profiles: ["searxng", "full"]
    ports:
      - "${SEARXNG_PORT:-8081}:8080"
    environment:
      - SEARXNG_BASE_URL=${SEARXNG_BASE_URL:-http://localhost:${SEARXNG_PORT:-8081}/}
      - SEARXNG_SECRET=${SEARXNG_SECRET:-$(openssl rand -hex 32)}
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    networks:
      - search-net
    restart: unless-stopped
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:8080/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis for caching
  redis:
    image: redis:alpine
    profiles: ["crawl4ai", "full"]
    command: redis-server --save 30 1 --loglevel warning
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    networks:
      - search-net
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3

  # Crawl4AI service for web scraping
  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    profiles: ["crawl4ai", "full"]
    shm_size: "1gb"
    ports:
      - "${CRAWL4AI_PORT:-11235}:11235"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - search-net
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy

  # Our MCP Server (orchestrates SearXNG + Crawl4AI)
  mcp-server:
    build: 
      context: .
      dockerfile: Dockerfile
    ports:
      - "${MCP_HTTP_PORT:-3003}:3003"
    environment:
      - SEARXNG_URL=${SEARXNG_URL:-http://host.docker.internal:${SEARXNG_PORT:-8081}}
      - CRAWL4AI_URL=${CRAWL4AI_URL:-http://host.docker.internal:${CRAWL4AI_PORT:-11235}}
      - CRAWL4AI_BEARER_TOKEN=${CRAWL4AI_BEARER_TOKEN:-}
      - CRAWL4AI_RETRIES=${CRAWL4AI_RETRIES:-1}
      - MCP_TRANSPORT=${MCP_TRANSPORT:-streamable-http}
      - MCP_HTTP_PORT=3003
      - MCP_HTTP_PATH=${MCP_HTTP_PATH:-/mcp}
      - OPENAPI_BASE_PATH=${OPENAPI_BASE_PATH:-/api}
      - ENABLED_TOOLS=${ENABLED_TOOLS:-search_web,search_and_crawl,crawl4ai_crawl,crawl4ai_crawl_stream,crawl4ai_markdown}
      - LOG_LEVEL=info
    networks:
      - search-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

volumes:
  redis_data:

networks:
  search-net:
    driver: bridge
